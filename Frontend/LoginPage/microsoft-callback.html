<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Signing you in... | ScheduleMate Pro</title>
    <link rel="stylesheet" href="/Form.css" />
    <link rel="icon" type="image/png" href="/Images/favicon.png" />
    <style>
      .callback-box {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 1rem;
        padding: 2.5rem 2rem;
        background: white;
        border-radius: 16px;
        box-shadow: 0 10px 30px rgba(107, 70, 193, 0.12);
        max-width: 360px;
        width: 90%;
        text-align: center;
      }
      .spinner {
        width: 48px;
        height: 48px;
        border: 4px solid #e2e8f0;
        border-top-color: #6b46c1;
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
      }
      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }
      .callback-box h2 {
        font-size: 1.3rem;
        color: #2d3748;
        margin: 0;
      }
      .callback-box p {
        color: #4a5568;
        font-size: 0.95rem;
        margin: 0;
      }
      .error-msg {
        color: #c53030;
        background: #fef2f2;
        border-radius: 8px;
        padding: 0.75rem 1rem;
        font-size: 0.9rem;
        display: none;
      }
    </style>
  </head>
  <body>
    <div class="callback-box">
      <div class="spinner" id="spinner"></div>
      <h2>Signing you in…</h2>
      <p>Just a moment while we set up your session.</p>
      <div class="error-msg" id="errorMsg"></div>
    </div>

    <script>
      (function () {
        function showError(msg) {
          document.getElementById("spinner").style.display = "none";
          const err = document.getElementById("errorMsg");
          err.textContent = msg;
          err.style.display = "block";
          setTimeout(() => {
            window.location.href = "/LoginPage/login.html";
          }, 3000);
        }

        // Read from URL fragment (#token=...&username=...&user_id=...)
        const hash = window.location.hash.slice(1); // remove leading #
        if (!hash) {
          showError("No session data received. Redirecting to login…");
          return;
        }

        const params = new URLSearchParams(hash);
        const token = params.get("token");
        const username = params.get("username");
        const userId = params.get("user_id");

        if (!token || !userId) {
          showError("Invalid session data. Redirecting to login…");
          return;
        }

        // Store exactly the same way the normal login does
        localStorage.setItem("sm_token", token);
        sessionStorage.setItem("justLoggedIn", "1");

        // Clear the fragment from the URL so the token isn't in browser history
        if (window.history.replaceState) {
          window.history.replaceState(null, "", window.location.pathname);
        }

        // If user came via a shared room link, honour it
        const pendingCode = sessionStorage.getItem("pendingJoinCode");
        if (pendingCode) {
          window.location.href = `/Dashboard/dashboard.html?joinCode=${pendingCode}`;
        } else {
          window.location.href = "/Dashboard/dashboard.html";
        }
      })();
    </script>
  </body>
</html>
