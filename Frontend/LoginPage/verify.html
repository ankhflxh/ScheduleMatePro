<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Verify Account - ScheduleMate Pro</title>
    <link rel="stylesheet" href="../LandingPage/style.css" />
    <link rel="stylesheet" href="../Form.css" />
    <style>
      /* Corrected Background: Use 100% to avoid scrollbar clipping */
      #lottie-background {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        z-index: -1;
        background-color: #f8fafc;
        pointer-events: none;
      }

      body {
        margin: 0;
        padding: 0;
        width: 100%;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        font-family: "Inter", sans-serif;
        background-color: #f8fafc;
        overflow-x: hidden;
      }

      /* Premium Glass Card */
      .premium-verify-card {
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(16px);
        -webkit-backdrop-filter: blur(16px);
        border: 1px solid rgba(255, 255, 255, 0.3);
        box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
        border-radius: 24px;
        padding: 48px 32px;
        width: 90%;
        max-width: 440px;
        text-align: center;
        z-index: 10;
      }

      .otp-input {
        width: 100%;
        padding: 16px;
        font-size: 32px;
        text-align: center;
        letter-spacing: 12px;
        border-radius: 12px;
        border: 2px solid #e2e8f0;
        background: #f1f5f9;
        color: #0f172a;
        font-weight: 800;
        font-family: monospace;
        transition: all 0.3s ease;
      }

      .otp-input:focus {
        outline: none;
        border-color: #10b981;
        background: #ffffff;
        box-shadow: 0 0 0 4px rgba(16, 185, 129, 0.15);
      }

      /* Inline success state — no overlay, no blur */
      .success-state {
        display: none;
        flex-direction: column;
        align-items: center;
        text-align: center;
      }
    </style>
  </head>
  <body>
    <div id="lottie-background"></div>

    <main class="premium-verify-card">
      <div id="formState">
        <h2
          style="
            color: #0f172a;
            font-size: 28px;
            font-weight: 800;
            margin-bottom: 12px;
          "
        >
          Check Your Email
        </h2>
        <p style="color: #64748b; font-size: 16px; margin-bottom: 8px">
          Enter the 6-digit code we sent to your inbox.
        </p>
        <p style="color: #94a3b8; font-size: 13px; margin-bottom: 30px">
          📌 Can't find it? Check your <strong>spam or junk folder</strong>.
        </p>

        <div id="verifyAlert" class="alert"></div>

        <form id="verifyForm">
          <input
            type="text"
            id="otpCode"
            class="otp-input"
            maxlength="6"
            placeholder="000000"
            required
          />
          <button
            type="submit"
            id="verifyBtn"
            class="auth-button"
            style="
              width: 100%;
              margin-top: 24px;
              padding: 16px;
              border-radius: 12px;
            "
          >
            Verify Account
          </button>
        </form>

        <p style="margin-top: 24px; font-size: 14px; color: #64748b">
          Didn't get a code?
          <a
            id="resendBtn"
            style="color: #10b981; font-weight: 600; cursor: pointer"
            >Resend</a
          >
        </p>
      </div>

      <!-- Shown after successful verification — no dark overlay -->
      <div id="successState" class="success-state">
        <div
          id="lottie-success-animation"
          style="width: 140px; height: 140px; margin: 0 auto"
        ></div>
        <h2
          style="
            color: #0f172a;
            font-size: 24px;
            font-weight: 700;
            margin-top: 20px;
          "
        >
          Verification Successful!
        </h2>
        <p style="color: #64748b; margin: 12px 0 30px 0">
          Your account is now active. Please sign in to continue.
        </p>
        <button
          id="verifyOkBtn"
          class="auth-button"
          style="width: 100%; border-radius: 12px"
        >
          Continue to Sign In
        </button>
      </div>
    </main>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/bodymovin/5.12.2/lottie.min.js"></script>
    <script src="verify.js"></script>
  </body>
</html>
