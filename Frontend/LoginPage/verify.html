<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Verify Account - ScheduleMate Pro</title>
    <link rel="stylesheet" href="../LandingPage/style.css" />
    <link rel="stylesheet" href="../Form.css" />
    <style>
      .otp-input {
        width: 100%;
        padding: 15px;
        font-size: 28px;
        text-align: center;
        letter-spacing: 12px;
        border-radius: 8px;
        border: 2px solid #ddd;
        margin-bottom: 20px;
        box-sizing: border-box;
      }
      .otp-input:focus {
        outline: none;
        border-color: #10b981;
      }
      .resend-text {
        text-align: center;
        margin-top: 15px;
        font-size: 14px;
        color: #666;
      }
      .resend-text a {
        color: #10b981;
        cursor: pointer;
        text-decoration: underline;
      }
    </style>
  </head>
  <body>
    <div class="login-container">
      <h2 style="text-align: center">Check Your Email</h2>
      <p style="text-align: center; color: #666; margin-bottom: 20px">
        We sent a 6-digit code to your email address.
      </p>

      <div id="verifyAlert" class="alert"></div>

      <form id="verifyForm">
        <input
          type="text"
          id="otpCode"
          class="otp-input"
          maxlength="6"
          placeholder="------"
          autocomplete="off"
          required
        />
        <button type="submit" id="verifyBtn" class="btn">Verify Account</button>
      </form>

      <p class="resend-text">
        Didn't get the code? <a id="resendBtn">Resend Code</a>
      </p>
    </div>

    <script src="verify.js"></script>
  </body>
</html>
